<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? '✏️ Редактирование пользователя' : '➕ Новый пользователь' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" [(ngModel)]="formData.email" name="email" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">{{ isEdit ? 'Новый пароль' : 'Пароль *' }}</label>
            <input type="password" class="form-control" [(ngModel)]="formData.passwordHash" name="passwordHash" [required]="!isEdit" [placeholder]="isEdit ? 'Оставьте пустым, чтобы не менять' : ''">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Имя *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.firstName" name="firstName" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Фамилия *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.lastName" name="lastName" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Телефон</label>
            <input type="text" class="form-control" [(ngModel)]="formData.phone" name="phone">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Роль</label>
            <select class="form-select" [(ngModel)]="formData.role" name="role">
              <option value="READER">Читатель</option>
              <option value="ADMIN">Администратор</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Адрес</label>
          <input type="text" class="form-control" [(ngModel)]="formData.address" name="address">
        </div>

        <div *ngIf="isEdit" class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" [(ngModel)]="formData.isActive" name="isActive">
          <label class="form-check-label">Активен</label>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Сохранение...' : 'Сохранить' }}</button>
          <button type="button" class="btn btn-secondary" routerLink="/users">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>
