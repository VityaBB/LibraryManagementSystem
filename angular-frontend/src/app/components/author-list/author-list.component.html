<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2> Управление авторами</h2>
    <div>
      <button class="btn btn-primary me-2" routerLink="/authors/new">➕ Новый автор</button>
      <span class="badge bg-primary">Всего: {{ totalElements }}</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="loading" class="text-center mt-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Имя</th>
          <th>Фамилия</th>
          <th>Полное имя</th>
          <th>Дата рождения</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="authors.length === 0">
          <td colspan="6" class="text-center text-muted py-3">Нет данных</td>
        </tr>
        <tr *ngFor="let author of authors">
          <td>{{ author.id }}</td>
          <td>{{ author.firstName }}</td>
          <td>{{ author.lastName }}</td>
          <td>{{ author.fullName }}</td>
          <td>{{ author.birthDate ? (author.birthDate | date:'dd.MM.yyyy') : '—' }}</td>
          <td>
            <button class="btn btn-sm btn-info me-1" [routerLink]="['/authors', author.id, 'edit']">✏️</button>
            <button class="btn btn-sm btn-danger" (click)="deleteAuthor(author.id!)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <nav *ngIf="totalPages > 1" class="mt-3">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="page === 0">
        <button class="page-link" (click)="changePage(page - 1)">Назад</button>
      </li>
      <li class="page-item" *ngFor="let pageNum of getPageNumbers()" [class.active]="page === pageNum">
        <button class="page-link" (click)="changePage(pageNum)">{{ pageNum + 1 }}</button>
      </li>
      <li class="page-item" [class.disabled]="page >= totalPages - 1">
        <button class="page-link" (click)="changePage(page + 1)">Вперед</button>
      </li>
    </ul>
  </nav>
</div>
