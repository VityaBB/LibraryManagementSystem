<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? '✏️ Редактирование автора' : '➕ Новый автор' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Имя *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.firstName" name="firstName" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Фамилия *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.lastName" name="lastName" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Дата рождения</label>
          <input type="date" class="form-control" [(ngModel)]="formData.birthDate" name="birthDate">
        </div>

        <div class="mb-3">
          <label class="form-label">Биография</label>
          <textarea class="form-control" [(ngModel)]="formData.biography" name="biography" rows="4"></textarea>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Сохранение...' : 'Сохранить' }}</button>
          <button type="button" class="btn btn-secondary" routerLink="/authors">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>
