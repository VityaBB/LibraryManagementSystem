<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? '✏️ Редактирование издателя' : '➕ Новый издатель' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Название *</label>
          <input type="text" class="form-control" [(ngModel)]="formData.name" name="name" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Адрес</label>
          <input type="text" class="form-control" [(ngModel)]="formData.address" name="address">
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Телефон</label>
            <input type="text" class="form-control" [(ngModel)]="formData.phone" name="phone">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="formData.email" name="email">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Веб-сайт</label>
          <input type="text" class="form-control" [(ngModel)]="formData.website" name="website">
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Сохранение...' : 'Сохранить' }}</button>
          <button type="button" class="btn btn-secondary" routerLink="/publishers">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>
