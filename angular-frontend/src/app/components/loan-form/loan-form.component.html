<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? '✏️ Редактирование выдачи' : '➕ Новая выдача' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Книга *</label>
            <select class="form-select" [(ngModel)]="formData.bookId" name="bookId" required [disabled]="isEdit">
              <option value="0">Выберите книгу</option>
              <option *ngFor="let book of books" [value]="book.id">{{ book.title }} (доступно: {{ book.availableCopies || 0 }})</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Пользователь *</label>
            <select class="form-select" [(ngModel)]="formData.userId" name="userId" required [disabled]="isEdit">
              <option value="0">Выберите пользователя</option>
              <option *ngFor="let user of users" [value]="user.id">{{ user.fullName }} ({{ user.email }})</option>
            </select>
          </div>
        </div>

        <div *ngIf="isEdit" class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Статус</label>
            <select class="form-select" [(ngModel)]="formData.status" name="status">
              <option value="ACTIVE">ACTIVE</option>
              <option value="RETURNED">RETURNED</option>
              <option value="OVERDUE">OVERDUE</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Штраф</label>
            <input type="number" class="form-control" [(ngModel)]="formData.fineAmount" name="fineAmount" step="0.01" min="0">
          </div>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Сохранение...' : 'Сохранить' }}</button>
          <button type="button" class="btn btn-secondary" routerLink="/loans">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>
