<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? '✏️ Редактирование книги' : '➕ Новая книга' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Название *</label>
            <input type="text" class="form-control" [(ngModel)]="formData.title" name="title" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" class="form-control" [(ngModel)]="formData.isbn" name="isbn">
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Год публикации</label>
            <input type="number" class="form-control" [(ngModel)]="formData.publicationYear" name="publicationYear">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Количество экземпляров</label>
            <input type="number" class="form-control" [(ngModel)]="formData.totalCopies" name="totalCopies" min="1">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Количество страниц</label>
            <input type="number" class="form-control" [(ngModel)]="formData.pageCount" name="pageCount" min="0">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Издатель</label>
          <select class="form-select" [(ngModel)]="formData.publisherId" name="publisherId">
            <option value="0">Выберите издателя</option>
            <option *ngFor="let publisher of publishers" [value]="publisher.id">{{ publisher.name }}</option>
          </select>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Авторы</label>
            <select class="form-select" multiple (change)="onAuthorSelect($event)" name="authors">
              <option *ngFor="let author of authors" [value]="author.id" [selected]="isAuthorSelected(author.id)">{{ author.fullName }}</option>
            </select>
            <small class="text-muted">Держите Ctrl для выбора нескольких</small>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Жанры</label>
            <select class="form-select" multiple (change)="onGenreSelect($event)" name="genres">
              <option *ngFor="let genre of genres" [value]="genre.id" [selected]="isGenreSelected(genre.id)">{{ genre.name }}</option>
            </select>
            <small class="text-muted">Держите Ctrl для выбора нескольких</small>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea class="form-control" [(ngModel)]="formData.description" name="description" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Сохранение...' : 'Сохранить' }}</button>
          <button type="button" class="btn btn-secondary" routerLink="/books">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>
