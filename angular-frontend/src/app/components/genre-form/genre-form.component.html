<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ isEdit ? '✏️ Редактирование жанра' : '➕ Новый жанр' }}</h3>
    </div>
    <div class="card-body">
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Название *</label>
          <input type="text" class="form-control" [(ngModel)]="formData.name" name="name" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea class="form-control" [(ngModel)]="formData.description" name="description" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Сохранение...' : 'Сохранить' }}</button>
          <button type="button" class="btn btn-secondary" routerLink="/genres">Отмена</button>
        </div>
      </form>
    </div>
  </div>
</div>
